name: Build Agent Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            output: cyberagent-linux
          - os: macos-latest
            name: macos
            output: cyberagent-mac
          - os: windows-latest
            name: windows
            output: cyberagent-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller websockets

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd agent
          pyinstaller \
            --onefile \
            --name ${{ matrix.output }} \
            --add-data "*.py:." \
            --hidden-import asyncio \
            --hidden-import websockets \
            --hidden-import websockets.legacy \
            --hidden-import websockets.legacy.client \
            agent.py

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd agent
          pyinstaller `
            --onefile `
            --name ${{ matrix.output }} `
            --add-data "*.py;." `
            --hidden-import asyncio `
            --hidden-import websockets `
            --hidden-import websockets.legacy `
            --hidden-import websockets.legacy.client `
            agent.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: agent/dist/${{ matrix.output }}*

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Android APK
        run: |
          cd agent/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberagent-android
          path: agent/android/app/build/outputs/apk/release/cyberagent.apk

  package-usb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Assemble USB package
        run: |
          mkdir -p usb_package/bin

          # 复制启动脚本
          cp usb_agent/launch.sh usb_package/
          cp usb_agent/launch.bat usb_package/
          cp usb_agent/README.md usb_package/
          chmod +x usb_package/launch.sh

          # 复制各平台二进制
          [ -f dist/cyberagent-linux/cyberagent-linux ]       && cp dist/cyberagent-linux/cyberagent-linux       usb_package/bin/
          [ -f dist/cyberagent-mac/cyberagent-mac ]           && cp dist/cyberagent-mac/cyberagent-mac           usb_package/bin/
          [ -f "dist/cyberagent-windows.exe/cyberagent-windows.exe" ] && cp "dist/cyberagent-windows.exe/cyberagent-windows.exe" usb_package/bin/

          chmod +x usb_package/bin/cyberagent-linux usb_package/bin/cyberagent-mac 2>/dev/null || true

          echo "📦 USB package contents:"
          find usb_package -type f | sort

          # 打包 zip
          zip -r usb_agent.zip usb_package/

      - name: Upload USB package artifact
        uses: actions/upload-artifact@v4
        with:
          name: usb_agent
          path: usb_agent.zip

  release:
    needs: [build, build-android, package-usb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
          generate_release_notes: true
