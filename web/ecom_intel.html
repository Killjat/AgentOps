<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>独立站情报 · CyberStroll</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; }

.header { padding: 20px 32px; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; font-weight: 700; color: #f0f6fc; }
.header .sub { font-size: 12px; color: #8b949e; margin-top: 3px; }
.back-btn { color: #8b949e; text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid #30363d; border-radius: 6px; }
.back-btn:hover { color: #f0f6fc; border-color: #484f58; }

/* 主布局：左侧品类 + 右侧内容 */
.layout { display: flex; gap: 0; min-height: calc(100vh - 65px); }

/* 左侧品类栏 */
.sidebar { width: 220px; flex-shrink: 0; border-right: 1px solid #21262d; padding: 20px 0; background: #0d1117; position: sticky; top: 0; height: calc(100vh - 65px); overflow-y: auto; }
.sidebar-title { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 1px; padding: 0 16px 10px; }
.cat-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; border-left: 2px solid transparent; transition: all .15s; }
.cat-item:hover { background: #161b22; color: #f0f6fc; }
.cat-item.active { background: #161b22; border-left-color: #388bfd; color: #f0f6fc; }
.cat-item .cat-icon { font-size: 16px; flex-shrink: 0; }
.cat-item .cat-name { font-size: 13px; color: #8b949e; }
.cat-item.active .cat-name { color: #f0f6fc; }
.cat-item .cat-hot { font-size: 10px; color: #f85149; margin-left: auto; }
.cat-divider { height: 1px; background: #21262d; margin: 8px 16px; }
.cache-badge { font-size: 10px; background: #1a4731; color: #3fb950; padding: 1px 5px; border-radius: 3px; margin-left: auto; }

/* 右侧内容区 */
.main { flex: 1; padding: 24px 28px; overflow-x: hidden; min-width: 0; }

/* 搜索区 */
.search-box { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.search-box h2 { font-size: 14px; font-weight: 600; color: #f0f6fc; margin-bottom: 4px; }
.search-box p { font-size: 12px; color: #8b949e; margin-bottom: 14px; }
.search-row { display: flex; gap: 8px; }
.search-input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 9px 14px; color: #f0f6fc; font-size: 13px; outline: none; }
.search-input:focus { border-color: #388bfd; }
.search-input::placeholder { color: #484f58; }
.search-btn { background: #238636; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.search-btn:hover { background: #2ea043; }
.search-btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.limit-select { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 9px 10px; color: #f0f6fc; font-size: 12px; cursor: pointer; }

/* 状态 */
.status-bar { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 12px; color: #8b949e; }
.status-bar.loading { border-color: #388bfd44; }
.status-bar.done { border-color: #3fb95044; }
.status-bar.error { border-color: #f8514944; color: #f85149; }
.spinner { width: 13px; height: 13px; border: 2px solid #30363d; border-top-color: #388bfd; border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* 洞察数字 */
.insight-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.insight-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 14px; }
.insight-card .num { font-size: 24px; font-weight: 800; color: #f0f6fc; line-height: 1; }
.insight-card .lbl { font-size: 10px; color: #8b949e; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.insight-card .detail { font-size: 10px; color: #484f58; margin-top: 3px; }

/* 站点卡片 */
.sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
.site-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 18px; transition: border-color .2s; }
.site-card:hover { border-color: #388bfd44; }

.site-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.site-favicon { width: 32px; height: 32px; border-radius: 6px; background: #21262d; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; overflow: hidden; }
.site-favicon img { width: 100%; height: 100%; object-fit: cover; }
.site-domain { font-size: 14px; font-weight: 700; color: #79c0ff; font-family: monospace; }
.site-domain a { color: inherit; text-decoration: none; }
.site-domain a:hover { text-decoration: underline; }
.site-meta { font-size: 11px; color: #8b949e; margin-top: 2px; }

.site-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag-shopify { background: #1a3a5a; color: #60a5fa; }
.tag-woo { background: #2a1a4a; color: #a78bfa; }
.tag-custom { background: #1a4731; color: #3fb950; }
.tag-nextjs { background: #1c2128; color: #e6edf3; border: 1px solid #30363d; }
.tag-cf { background: #3d2b00; color: #d29922; }
.tag-cloudfront { background: #1a2a3e; color: #60a5fa; }
.tag-vercel { background: #1c2128; color: #e6edf3; border: 1px solid #30363d; }
.tag-netlify { background: #0a1f3a; color: #38bdf8; }
.tag-fastly { background: #1a2a1a; color: #3fb950; }
.tag-unknown { background: #21262d; color: #8b949e; border: 1px solid #30363d; }

.site-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.metric { background: #0d1117; border-radius: 6px; padding: 7px 10px; }
.metric-label { font-size: 10px; color: #484f58; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 12px; font-weight: 600; color: #f0f6fc; margin-top: 2px; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.payment-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.pay-tag { padding: 2px 7px; background: #0d2a1a; border: 1px solid #1a4731; border-radius: 4px; font-size: 11px; color: #3fb950; }

.site-error { font-size: 12px; color: #f85149; background: #1a0a0a; border-radius: 6px; padding: 8px 10px; }

/* 空状态 */
.empty-state { text-align: center; padding: 60px 20px; color: #484f58; }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }

@media (max-width: 768px) {
  .insight-row { grid-template-columns: repeat(2, 1fr); }
  .search-row { flex-wrap: wrap; }
  .search-input { min-width: 0; }
  .sidebar { width: 180px; }
}

/* 弹窗 */
.modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px; }
.modal { background:#161b22;border:1px solid #30363d;border-radius:12px;width:100%;max-width:680px;max-height:88vh;overflow-y:auto; }
.modal-header { padding:16px 20px;border-bottom:1px solid #21262d;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#161b22;z-index:1; }
.modal-header h3 { font-size:14px;font-weight:700;color:#f0f6fc; }
.modal-close { background:none;border:none;color:#8b949e;font-size:22px;cursor:pointer;line-height:1;padding:0 4px; }
.modal-body { padding:20px; }
.report-section { margin-bottom:20px; }
.report-section h4 { font-size:10px;color:#484f58;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #21262d; }
.report-row { display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;font-size:13px; }
.report-label { color:#8b949e;flex-shrink:0;width:110px; }
.report-value { color:#f0f6fc;text-align:right;flex:1; }
.report-link { color:#388bfd;text-decoration:none;font-size:12px;display:inline-block;margin-left:8px; }
.report-link:hover { text-decoration:underline; }
.maturity-bar { height:5px;background:#21262d;border-radius:3px;margin-top:8px;overflow:hidden; }
.maturity-fill { height:100%;border-radius:3px;background:linear-gradient(90deg,#388bfd,#3fb950);transition:width .5s; }
.product-item { background:#0d1117;border-radius:6px;padding:9px 12px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center; }
.product-title { font-size:12px;color:#e6edf3;flex:1;margin-right:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.product-price { font-size:12px;color:#3fb950;font-weight:600;white-space:nowrap; }
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">← 返回</a>
  <div>
    <h1>🏪 独立站情报</h1>
    <div class="sub">输入关键词，自动发现并分析全球独立站基础设施</div>
  </div>
</div>

<!-- 复刻报告弹窗 -->
<div class="modal-overlay" id="cloneModal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">📋 复刻报告</h3>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="downloadBtn" onclick="downloadReport()"
          style="background:#238636;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;display:none">
          ⬇️ 下载报告
        </button>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody">
      <div style="text-align:center;padding:40px;color:#484f58">
        <div class="spinner" style="margin:0 auto 12px"></div>
        <div>正在生成报告...</div>
      </div>
    </div>
  </div>
</div>

<div class="layout">

<!-- 左侧品类栏 -->
<div class="sidebar">
  <div class="sidebar-title">🔥 TikTok 热门品类</div>
  <div id="catList"></div>
  <div style="padding:12px 16px;border-top:1px solid #21262d;margin-top:8px">
    <div style="font-size:10px;color:#484f58;text-align:center">数据每日自动更新</div>
  </div>
</div>

<!-- 右侧主内容 -->
<div class="main">

  <!-- 搜索区 -->
  <div class="search-box">
    <h2>搜索独立站</h2>
    <p>输入商品类目关键词，系统自动从 FOFA 发现相关独立站，分析平台/CDN/支付/技术栈/社交媒体</p>
    <div class="search-row">
      <input class="search-input" id="keyword" type="text" placeholder="例如：phone case、sneakers、skincare..." />
      <select class="limit-select" id="limit">
        <option value="5">5个站</option>
        <option value="10" selected>10个站</option>
        <option value="20">20个站</option>
        <option value="50">50个站</option>
      </select>
      <button class="search-btn" id="searchBtn" onclick="doSearch()">🔍 批量搜索</button>
    </div>
    <!-- 过滤条件 -->
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #21262d">
      <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#8b949e;user-select:none">
        <input type="radio" name="filter" value="all" checked onchange="filterChanged()" style="accent-color:#388bfd">
        <span>全部站点</span>
      </label>
      <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#69c9d0;user-select:none">
        <input type="radio" name="filter" value="tiktok" onchange="filterChanged()" style="accent-color:#69c9d0">
        <span>🎵 有 TikTok 账号</span>
      </label>
      <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:#69c9d0;user-select:none">
        <input type="radio" name="filter" value="tt_ads" onchange="filterChanged()" style="accent-color:#69c9d0">
        <span>🎯 在投 TikTok 广告</span>
      </label>
    </div>

    <!-- 单站分析 -->
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #21262d">
      <div style="font-size:12px;color:#8b949e;margin-bottom:8px">或者直接分析某个域名：</div>
      <div class="search-row">
        <input class="search-input" id="singleDomain" type="text" placeholder="例如：shakercase.com" />
        <button class="search-btn" id="singleBtn" onclick="doSingle()" style="background:#1f6feb">🔬 单站分析</button>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div class="status-bar" id="statusBar" style="display:none"></div>

  <!-- 洞察数字 -->
  <div class="insight-row" id="insightRow" style="display:none">
    <div class="insight-card" style="border-color:#388bfd44">
      <div class="num" id="totalCount" style="color:#388bfd">-</div>
      <div class="lbl">发现站点</div>
      <div class="detail" id="keywordLabel">-</div>
    </div>
    <div class="insight-card" style="border-color:#d2992244">
      <div class="num" id="shopifyCount" style="color:#d29922">-</div>
      <div class="lbl">Shopify 站</div>
      <div class="detail" id="shopifyPct">-</div>
    </div>
    <div class="insight-card" style="border-color:#3fb95044">
      <div class="num" id="cfCount" style="color:#3fb950">-</div>
      <div class="lbl">Cloudflare CDN</div>
      <div class="detail" id="cfPct">-</div>
    </div>
    <div class="insight-card" style="border-color:#a78bfa44">
      <div class="num" id="payCount" style="color:#a78bfa">-</div>
      <div class="lbl">识别支付方式</div>
      <div class="detail" id="payDetail">-</div>
    </div>
  </div>

  <!-- 站点列表 -->
  <div class="sites-grid" id="sitesGrid"></div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState">
    <div class="icon">🔍</div>
    <p>输入关键词，发现全球独立站情报</p>
  </div>

</div>

<script>
const API = '';

function quickSearch(kw) {
  document.getElementById('keyword').value = kw;
  doSearch();
}

async function doSingle() {
  const domain = document.getElementById('singleDomain').value.trim();
  if (!domain) { alert('请输入域名'); return; }
  const btn = document.getElementById('singleBtn');
  btn.disabled = true; btn.textContent = '分析中...';
  showStatus('loading', `正在分析 ${domain}...`);
  document.getElementById('insightRow').style.display = 'none';
  document.getElementById('sitesGrid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  try {
    const res = await fetch(`${API}/netcheck/ecom/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ domain })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const s = await res.json();
    // 单站结果直接渲染一张卡片
    document.getElementById('sitesGrid').innerHTML = siteCard(s);
    showStatus('done', `✅ 分析完成：${s.domain} · ${s.analyzed_at}`);
  } catch(e) {
    showStatus('error', `❌ 失败：${e.message}`);
  } finally {
    btn.disabled = false; btn.textContent = '🔬 单站分析';
  }
}

function filterChanged() {
  // 切换过滤条件时，对已有结果做客户端过滤，不重新请求接口
  if (_lastResults) renderResults(_lastResults);
}

function getFilter() {
  const v = document.querySelector('input[name="filter"]:checked')?.value || 'all';
  return v;
}

let _lastResults = null;  // 缓存上次搜索结果

async function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { alert('请输入关键词'); return; }

  const limit = parseInt(document.getElementById('limit').value);
  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '分析中...';

  showStatus('loading', `正在搜索"${keyword}"相关独立站，分析基础设施...`);
  document.getElementById('insightRow').style.display = 'none';
  document.getElementById('sitesGrid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';

  try {
    const res = await fetch(`${API}/netcheck/ecom/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ keyword, limit })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    _lastResults = data;
    renderResults(data);
    const f = getFilter();
    const filterLabel = f === 'tt_ads' ? '（仅 TikTok 广告投放）' : f === 'tiktok' ? '（仅有 TikTok 账号）' : '';
    showStatus('done', `✅ 分析完成，发现 ${data.total} 个站点${filterLabel} · ${data.analyzed_at}`);
  } catch (e) {
    showStatus('error', `❌ 请求失败：${e.message}`);
    document.getElementById('emptyState').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 开始分析';
  }
}

function showStatus(type, msg) {
  const bar = document.getElementById('statusBar');
  bar.style.display = 'flex';
  bar.className = `status-bar ${type}`;
  bar.innerHTML = type === 'loading'
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span>${msg}</span>`;
}

function renderResults(data) {
  let sites = data.sites || [];
  if (!sites.length) {
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  // 客户端过滤
  const f = getFilter();
  let filtered = sites;
  if (f === 'tiktok') filtered = sites.filter(s => s.social?.tiktok);
  if (f === 'tt_ads') filtered = sites.filter(s => s.social?.tt_pixel_id);

  const filterLabel = f === 'tt_ads' ? ' · 仅 TikTok 广告' : f === 'tiktok' ? ' · 仅有 TikTok 账号' : '';
  const cacheInfo = data.from_cache > 0 ? ` (缓存${data.from_cache}+新增${data.from_fofa||0})` : '';
  showStatus('done', `✅ 共 ${sites.length} 个站点${cacheInfo}，显示 ${filtered.length} 个${filterLabel} · ${data.analyzed_at}`);

  // 统计（基于全量结果）
  const shopify = sites.filter(s => s.platform === 'Shopify').length;
  const cf = sites.filter(s => s.cdn === 'Cloudflare').length;
  const withPay = sites.filter(s => s.payment && s.payment.length > 0).length;
  const allPay = [...new Set(sites.flatMap(s => s.payment || []))];

  document.getElementById('totalCount').textContent = filtered.length;
  document.getElementById('keywordLabel').textContent = `关键词：${data.keyword}`;
  document.getElementById('shopifyCount').textContent = shopify;
  document.getElementById('shopifyPct').textContent = `占比 ${Math.round(shopify/sites.length*100)}%`;
  document.getElementById('cfCount').textContent = cf;
  document.getElementById('cfPct').textContent = `占比 ${Math.round(cf/sites.length*100)}%`;
  document.getElementById('payCount').textContent = withPay;
  document.getElementById('payDetail').textContent = allPay.slice(0,3).join(' / ') || '未识别';
  document.getElementById('insightRow').style.display = 'grid';

  // 渲染卡片
  const grid = document.getElementById('sitesGrid');
  grid.innerHTML = filtered.length ? filtered.map(s => siteCard(s)).join('') : '<div style="color:#484f58;padding:40px;text-align:center">当前过滤条件下无匹配站点</div>';
}

function platformTag(p) {
  const map = {
    'Shopify': 'tag-shopify', 'WooCommerce': 'tag-woo', 'Next.js': 'tag-nextjs',
    'BigCommerce': 'tag-custom', 'Squarespace': 'tag-unknown'
  };
  const cls = map[p] || 'tag-unknown';
  return p !== '未知' ? `<span class="tag ${cls}">${p}</span>` : '';
}

function cdnTag(c) {
  const map = {
    'Cloudflare': 'tag-cf', 'CloudFront': 'tag-cloudfront', 'Vercel': 'tag-vercel',
    'Netlify': 'tag-netlify', 'Fastly': 'tag-fastly'
  };
  const cls = map[c] || 'tag-unknown';
  return c !== '未知' ? `<span class="tag ${cls}">${c}</span>` : '';
}

function socialRow(social) {
  if (!social || !Object.keys(social).length) return '';

  const cfg = {
    tiktok:    { label: 'TikTok',    bg: '#1a1a2e', border: '#69c9d0', color: '#69c9d0', base: 'https://www.tiktok.com/' },
    instagram: { label: 'Instagram', bg: '#2a1a2e', border: '#e1306c', color: '#e1306c', base: 'https://instagram.com/' },
    youtube:   { label: 'YouTube',   bg: '#2a1010', border: '#ff0000', color: '#ff4444', base: 'https://youtube.com/' },
    facebook:  { label: 'Facebook',  bg: '#0d1f3c', border: '#1877f2', color: '#4a9eff', base: 'https://facebook.com/' },
  };

  const badges = Object.entries(social)
    .filter(([k]) => cfg[k])
    .map(([k, v]) => {
      const c = cfg[k];
      const handle = v.startsWith('@') ? v.slice(1) : v;
      const url = c.base + handle;
      return `<a href="${url}" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:5px;padding:5px 10px;
               background:${c.bg};border:1px solid ${c.border};border-radius:6px;
               color:${c.color};font-size:12px;font-weight:600;text-decoration:none;
               transition:opacity .15s"
        onmouseover="this.style.opacity='.75'" onmouseout="this.style.opacity='1'">
        ${c.label} <span style="color:#fff;opacity:.9">${v}</span>
      </a>`;
    });

  // Pixel 标记（广告投放证明）
  const pixels = [];
  if (social.tt_pixel_id) pixels.push(
    `<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;
      background:#1a1a2e;border:1px dashed #69c9d0;border-radius:6px;
      font-size:11px;color:#69c9d0" title="该站正在投放TikTok广告">
      🎯 TT广告 <span style="opacity:.6">${social.tt_pixel_id}</span>
    </span>`
  );
  if (social.fb_pixel_id) pixels.push(
    `<span style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;
      background:#0d1f3c;border:1px dashed #1877f2;border-radius:6px;
      font-size:11px;color:#4a9eff" title="该站正在投放Facebook广告">
      🎯 FB广告 <span style="opacity:.6">${social.fb_pixel_id}</span>
    </span>`
  );

  const all = [...badges, ...pixels];
  if (!all.length) return '';
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid #21262d">
    ${all.join('')}
  </div>`;
}

function siteCard(s) {
  const favicon = `<img src="https://www.google.com/s2/favicons?domain=${s.domain}&sz=32" onerror="this.style.display='none';this.parentNode.textContent='🌐'" />`;
  const techTags = (s.tech_stack || []).map(t => `<span class="tag tag-unknown">${t}</span>`).join('');
  const appTags = (s.shopify_apps || []).map(a => `<span class="tag" style="background:#1a2a1a;color:#3fb950;border:1px solid #1a4731">📦 ${a}</span>`).join('');
  const payTags = (s.payment || []).map(p => `<span class="pay-tag">${p}</span>`).join('');
  const ipDisplay = s.ip ? s.ip.substring(0, 15) : '—';
  const serverDisplay = (s.server || '—').substring(0, 14);
  const priceDisplay = s.price_hint ? s.price_hint.substring(0, 20) : '—';
  const location = [s.city, s.country].filter(Boolean).join(', ') || '—';

  // 流量和规模信息
  const traffic = s.traffic || {};
  const visits = traffic.monthly_visits || '';
  const rank = traffic.global_rank ? `#${traffic.global_rank.toLocaleString()}` : '';
  const products = s.product_count > 0 ? `${s.product_count}+ SKU` : '—';
  const regDate = s.registered_at ? s.registered_at.substring(0, 7) : '—';
  const domainId = s.domain.replace(/\./g, '_');

  return `
  <div class="site-card">
    <div class="site-header">
      <div class="site-favicon">${favicon}</div>
      <div>
        <div class="site-domain"><a href="https://${s.domain}" target="_blank">${s.domain}</a></div>
        <div class="site-meta">${s.title || '—'} · ${location}</div>
      </div>
    </div>
    <div class="site-tags">
      ${platformTag(s.platform)}
      ${cdnTag(s.cdn)}
    </div>
    ${(techTags || appTags) ? `
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
      <span style="font-size:10px;color:#484f58;align-self:center;text-transform:uppercase;letter-spacing:.5px">技术栈</span>
      ${techTags}
      ${appTags}
    </div>` : ''}
    <div class="site-metrics">
      <div class="metric" id="sw_${domainId}">
        <div class="metric-label">月访问量</div>
        <div class="metric-value">
          ${visits
            ? `<span style="color:#3fb950">${visits}</span>`
            : `<a href="https://www.similarweb.com/website/${s.domain}/" target="_blank"
                style="color:#388bfd;font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:3px"
                title="在 SimilarWeb 查看流量数据">
                📊 查看
               </a>`
          }
        </div>
      </div>
      <div class="metric"><div class="metric-label">全球排名</div><div class="metric-value" id="rank_${domainId}">${rank||'—'}</div></div>
      <div class="metric"><div class="metric-label">商品数</div><div class="metric-value">${products}</div></div>
      <div class="metric"><div class="metric-label">建站时间</div><div class="metric-value">${regDate}</div></div>
      <div class="metric"><div class="metric-label">Server</div><div class="metric-value">${serverDisplay}</div></div>
      <div class="metric"><div class="metric-label">价格区间</div><div class="metric-value">${priceDisplay}</div></div>
    </div>
    ${payTags ? `<div class="payment-row">${payTags}</div>` : ''}
    ${socialRow(s.social)}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #21262d">
      <button onclick="showCloneReport('${s.domain}')"
        style="background:#1f6feb;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;width:100%">
        📋 生成复刻报告
      </button>
    </div>
    ${s.error ? `<div class="site-error">⚠️ ${s.error}</div>` : ''}
  </div>`;
}

let _cacheStats = {};  // 各品类缓存数量

async function loadCacheStats() {
  try {
    const r = await fetch(`${API}/netcheck/ecom/db/stats`);
    const d = await r.json();
    _cacheStats = {};
    (d.by_category || []).forEach(c => { _cacheStats[c.category] = c.count; });
    renderSidebar();
  } catch(e) {}
}

function renderSidebar() {
  const list = document.getElementById('catList');
  let html = '';
  const hotCats = HOT_CATEGORIES.filter(c => c.hot);
  const otherCats = HOT_CATEGORIES.filter(c => !c.hot);

  hotCats.forEach(c => {
    const cached = _cacheStats[c.kw] || 0;
    html += `<div class="cat-item" onclick="selectCategory('${c.kw}', this)">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
      ${c.hot ? '<span class="cat-hot">🔥</span>' : ''}
      ${cached > 0 ? `<span class="cache-badge">${cached}</span>` : ''}
    </div>`;
  });

  html += '<div class="cat-divider"></div>';
  otherCats.forEach(c => {
    const cached = _cacheStats[c.kw] || 0;
    html += `<div class="cat-item" onclick="selectCategory('${c.kw}', this)">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-name">${c.name}</span>
      ${cached > 0 ? `<span class="cache-badge">${cached}</span>` : ''}
    </div>`;
  });

  list.innerHTML = html;
}

function selectCategory(kw, el) {
  // 高亮选中
  document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  // 填入搜索框并触发搜索
  document.getElementById('keyword').value = kw;
  // 先查缓存，有数据直接展示，没有再搜索
  loadFromCache(kw);
}

async function loadFromCache(kw) {
  showStatus('loading', `正在加载"${kw}"缓存数据...`);
  document.getElementById('insightRow').style.display = 'none';
  document.getElementById('sitesGrid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  try {
    const r = await fetch(`${API}/netcheck/ecom/db?category=${encodeURIComponent(kw)}&limit=20`);
    const d = await r.json();
    if (d.total > 0) {
      _lastResults = { keyword: kw, sites: d.sites, total: d.total, analyzed_at: '缓存数据' };
      renderResults(_lastResults);
      showStatus('done', `✅ 从缓存加载 ${d.total} 个站点 · 点击"批量搜索"刷新数据`);
    } else {
      // 没有缓存，直接搜索
      doSearch();
    }
  } catch(e) {
    doSearch();
  }
}

  const d = _currentReport;
  const tech = d.tech_setup || {};
  const products = d.products || {};
  const mkt = d.marketing || {};
  const links = d.links || {};

  const md = `# 独立站复刻报告：${d.domain}
> 生成时间：${d.generated_at} · 数据来源：CyberStroll

---

## 🏗️ 建站方案

| 项目 | 内容 |
|------|------|
| 建站平台 | ${tech.platform || '—'} |
| CDN | ${tech.cdn || '—'} |
| 支付方式 | ${(tech.payment || []).join(' / ') || '—'} |
| 已安装 App | ${(tech.apps || []).join(', ') || '无'} |
| **推荐方案** | **${tech.recommended_stack || '—'}** |

---

## 📦 商品数据

| 项目 | 内容 |
|------|------|
| 商品总数 | ${products.total_count || '—'} SKU |
| 价格区间 | ${products.price_range || '—'} |
| 商品分类 | ${(products.collections || []).join(', ') || '—'} |

### TOP 商品
${(products.top_products || []).map(p =>

).join('\n') || '暂无数据'}

---

## 📣 营销策略

**运营成熟度：${mkt.maturity_level || '—'} (${mkt.maturity_score || 0}/100)**

${(mkt.traffic_sources || []).map(s => `- ${s}`).join('\n') || '未知'}

### 运营亮点

## 🔗 参考链接

${Object.entries(links).map(([k, v]) => {
  const labels = { store:'官网', products_api:'商品API', fb_ad_library:'FB广告库', tiktok:'TikTok账号', instagram:'Instagram账号' };

}).join('\n')}

  a.click();
  URL.revokeObjectURL(url);
}

// ── 复刻报告 ────────────────────────────────────────────────
async function showCloneReport(domain) {
  document.getElementById('cloneModal').style.display = 'flex';
  document.getElementById('modalTitle').textContent = `📋 复刻报告 · ${domain}`;
  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;padding:40px;color:#484f58">
      <div class="spinner" style="margin:0 auto 12px;width:20px;height:20px"></div>
      <div>正在抓取商品数据...</div>
    </div>`;
  try {
    const r = await fetch(`${API}/netcheck/ecom/clone-report?domain=${domain}`);
    const d = await r.json();
    _currentReport = d;
    document.getElementById('downloadBtn').style.display = 'block';
    renderCloneReport(d);
  } catch(e) {
    document.getElementById('modalBody').innerHTML = `<div style="color:#f85149;padding:20px">生成失败：${e.message}</div>`;
  }
}

function closeModal() {
  document.getElementById('cloneModal').style.display = 'none';
  document.getElementById('downloadBtn').style.display = 'none';
  _currentReport = null;
}

function renderCloneReport(d) {
  const tech = d.tech_setup || {};
  const products = d.products || {};
  const mkt = d.marketing || {};
  const links = d.links || {};
  const social = mkt.social || {};

  const appsHtml = (tech.apps || []).map(a =>
    `<span style="background:#1a2a1a;color:#3fb950;border:1px solid #1a4731;border-radius:4px;padding:2px 7px;font-size:11px;margin:2px">${a}</span>`
  ).join('') || '<span style="color:#484f58">无</span>';

  const sourcesHtml = (mkt.traffic_sources || []).map(s =>
    `<div style="padding:4px 0;font-size:12px;color:#e6edf3">• ${s}</div>`
  ).join('');

  const topProducts = (products.top_products || []).map(p =>
    `<div class="product-item">
      <div class="product-title">${p.title}</div>
      <div class="product-price">${p.min_price > 0 ? '$'+p.min_price.toFixed(0) : '—'}</div>
    </div>`
  ).join('');

  const collectionsHtml = (products.collections || []).slice(0, 6).join(' · ') || '—';

  const linksHtml = Object.entries(links).map(([k, v]) => {
    const labels = { store:'🌐 官网', products_api:'📦 商品API', fb_ad_library:'📢 FB广告库', tiktok:'🎵 TikTok', instagram:'📸 Instagram' };
    return `<a href="${v}" target="_blank" class="report-link">${labels[k]||k}</a>`;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="report-section">
      <h4>🏗️ 建站方案</h4>
      <div class="report-row"><span class="report-label">平台</span><span class="report-value">${tech.platform||'—'}</span></div>
      <div class="report-row"><span class="report-label">CDN</span><span class="report-value">${tech.cdn||'—'}</span></div>
      <div class="report-row"><span class="report-label">支付</span><span class="report-value">${(tech.payment||[]).join(' / ')||'—'}</span></div>
      <div class="report-row"><span class="report-label">已安装 App</span><span class="report-value">${appsHtml}</span></div>
      <div style="margin-top:10px;background:#0d1117;border-radius:6px;padding:10px 14px;font-size:12px;color:#3fb950">
        💡 推荐方案：${tech.recommended_stack||'—'}
      </div>
    </div>

    <div class="report-section">
      <h4>📦 商品数据</h4>
      <div class="report-row"><span class="report-label">商品总数</span><span class="report-value">${products.total_count||'—'} SKU</span></div>
      <div class="report-row"><span class="report-label">价格区间</span><span class="report-value" style="color:#3fb950">${products.price_range||'—'}</span></div>
      <div class="report-row"><span class="report-label">商品分类</span><span class="report-value" style="font-size:11px">${collectionsHtml}</span></div>
      ${topProducts ? `<div style="margin-top:10px"><div style="font-size:11px;color:#484f58;margin-bottom:6px">TOP 商品</div>${topProducts}</div>` : ''}
    </div>

    <div class="report-section">
      <h4>📣 营销策略</h4>
      <div class="report-row">
        <span class="report-label">运营成熟度</span>
        <span class="report-value">${mkt.maturity_level||'—'} (${mkt.maturity_score||0}/100)</span>
      </div>
      <div class="maturity-bar"><div class="maturity-fill" style="width:${mkt.maturity_score||0}%"></div></div>
      <div style="margin-top:10px">${sourcesHtml}</div>
      ${(mkt.maturity_items||[]).length ? `
      <div style="margin-top:8px;font-size:11px;color:#484f58">
        ${mkt.maturity_items.map(i=>`✓ ${i}`).join(' &nbsp;·&nbsp; ')}
      </div>` : ''}
    </div>

    <div class="report-section">
      <h4>🔗 参考链接</h4>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${linksHtml}</div>
    </div>

    <div style="text-align:center;margin-top:4px">
      <div style="font-size:10px;color:#484f58">生成于 ${d.generated_at} · 数据仅供参考</div>
    </div>
  `;
}

// 预热所有热门品类
async function warmupAll() {
  const btn = document.getElementById('warmupBtn');
  if (btn) { btn.textContent = '预热中...'; btn.disabled = true; }
  showStatus('loading', '正在后台预热所有热门品类，这需要几分钟...');
  try {
    const r = await fetch(`${API}/netcheck/ecom/warmup`, { method: 'POST' });
    const d = await r.json();
    const done = d.results.filter(r => r.status === 'done').length;
    const skip = d.results.filter(r => r.status === 'skipped').length;
    showStatus('done', `✅ 预热完成：${done} 个品类已抓取，${skip} 个已有缓存`);
    loadCacheStats();  // 刷新缓存数量
  } catch(e) {
    showStatus('error', `❌ 预热失败：${e.message}`);
  } finally {
    if (btn) { btn.textContent = '🔄 预热数据'; btn.disabled = false; }
  }
}
